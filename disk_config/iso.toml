[customizations.installer.kickstart]
contents = """
# Set language and keyboard layout to UK English
lang en_GB.UTF-8
keyboard uk

# Set timezone
timezone Europe/London --isUtc

# Automatically skip initial setup screens on first boot
firstboot --disable

# Natively provision the arcade user with proper home directories and wheel permissions
user --name=arcade --password=arcade --plaintext --groups=wheel

# Force installation to complete and reboot automatically
reboot --eject

%post
bootc switch --mutate-in-place --transport registry ghcr.io/joenash/bazzite-arcade:latest
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime"
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Subscription",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]
